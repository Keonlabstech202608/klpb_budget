<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1428">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:;">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-startup-image" href="splash.png">
    
    <title>KEONLABS • Business Engine v4.6.3</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --deep: #0a1428;
            --card: rgba(15, 23, 42, 0.92);
            --accent: #00f5ff;
            --success: #22ff88;
            --danger: #ff4d6b;
            --warning: #ffb300;
            --text: #e0f7ff;
            --glow: 0 0 20px rgba(0, 245, 255, 0.25);
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--deep); color: var(--text); margin: 0; }
        #static-bg { position: fixed; inset: 0; z-index: -2; background: linear-gradient(135deg, #0a1428 0%, #1e2937 100%), url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?auto=format&fit=crop&q=80&w=2071'); background-size: cover; filter: brightness(0.65); }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(0,245,255,0.2); border-radius: 16px; box-shadow: var(--glow); }
        .btn { padding: 13px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--glow); }
        .btn-main { background: var(--success); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; display: none; align-items: center; gap: 12px; background: rgba(15,23,42,0.95); border: 1px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { transform: translate(-50%, 80px); opacity: 0; } }
        input, select { background: rgba(255,255,255,0.06); border: 1px solid rgba(0,245,255,0.3); color: white; padding: 14px 16px; border-radius: 10px; width: 100%; margin: 6px 0; }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,245,255,0.2); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,245,255,0.08); color: var(--accent); padding: 14px 8px; text-align: left; }
        td { padding: 14px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .metric-box { padding: 14px; text-align: center; border-radius: 12px; background: rgba(0,0,0,0.4); }
        .metric-val { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,245,255,0.2); color: var(--text); padding: 10px 16px; border-radius: 10px; font-weight: 600; }
        .tab-btn.active { background: var(--accent); color: #000; box-shadow: var(--glow); }
        .overdue-debt { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div id="static-bg"></div>

<div id="toast" class="toast"><i class="fas fa-check-circle" style="color:#22ff88"></i><span id="toastMsg"></span></div>
<div id="customNotification" style="display:none;"></div>

<div id="customModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:20000;align-items:center;justify-content:center;padding:20px;">
    <div class="glass" style="width:100%;max-width:340px;padding:28px;">
        <h3 id="modalTitle" style="margin:0 0 20px;font-size:1.3rem;"></h3>
        <div id="modalInputs" style="display:flex;flex-direction:column;gap:12px;"></div>
        <div style="display:flex;gap:12px;margin-top:24px;">
            <button id="modalConfirm" class="btn btn-main">CONFIRM</button>
            <button onclick="closeCustomModal()" class="btn btn-danger">CANCEL</button>
        </div>
    </div>
</div>

<!-- AUTH OVERLAY (exactly as you had) -->
<div id="authOverlay" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;">

        <div class="brand-header" style="text-align:center;margin-bottom:24px;">
            <h1 style="margin:0;font-size:2rem;letter-spacing:3px;color:white;">KEONLABS</h1>

        <input type="password" id="authPass" placeholder="Password" style="margin-bottom:12px;">
        <button onclick="handleAuth('login')" class="btn btn-main">SYSTEM ACCESS</button>
        <div style="margin-top:20px;text-align:center;font-size:0.8rem;">
            <span onclick="toggleAuthMode('signup')" style="color:var(--success);cursor:pointer;">NEW USER? CREATE ACCOUNT</span><br>
            <span onclick="toggleAuthMode('reset')" style="color:var(--warning);cursor:pointer;">FORGOT PASSWORD?</span>
        </div>
    </div>

    <div class="glass auth-card" id="signupBox" style="display:none;width:320px;padding:32px;">
        <h2 style="color:var(--success);text-align:center;">INITIALIZE USER</h2>
        <input type="email" id="regEmail" placeholder="Email Address">
        <input type="password" id="regPass" placeholder="Secure Password (min 8)">
        <button onclick="handleAuth('signup')" class="btn btn-main" style="background:var(--accent);">REGISTER ACCOUNT</button>
        <span onclick="toggleAuthMode('login')" style="color:var(--accent);cursor:pointer;display:block;text-align:center;margin-top:16px;">← Back to Login</span>
    </div>

    <div class="glass auth-card" id="resetBox" style="display:none;width:320px;padding:32px;">
        <h2 style="color:var(--warning);text-align:center;">RECOVERY</h2>
        <input type="email" id="resetEmail" placeholder="Email Address">
        <button onclick="handleAuth('reset')" class="btn btn-main" style="background:var(--warning);">SEND RESET LINK</button>
        <span onclick="toggleAuthMode('login')" style="color:var(--accent);cursor:pointer;display:block;text-align:center;margin-top:16px;">← Back to Login</span>
    </div>
</div>

    <div id="business" class="tab-content active">

            <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">

            </div>
            <div style="display:flex;gap:5px;margin-bottom:10px;">
                <select id="timeFilter" onchange="renderAll()" style="font-size:0.7rem;">
                    <option value="YEAR">THIS YEAR</option>

                    <option value="WEEK">THIS WEEK</option>

                <input type="text" id="ledgerSearch" placeholder="🔍 Search logs..." onkeyup="renderAll()" style="margin:0;">
            </div>
            <div style="overflow-x:auto;"><table id="ledgerTable"><thead><tr><th>DATE</th><th>DESC</th><th>TYPE</th><th>AMT</th></tr></thead><tbody></tbody></table></div>
            <div id="ledgerFooter" style="margin-top:10px;padding:10px;background:rgba(191,0,255,0.1);border-radius:5px;text-align:right;font-weight:bold;color:var(--accent);"></div>
        </section>

    <div id="personal" class="tab-content">
        <section class="glass" style="padding:18px;">
            <div id="pStatsContainer" style="display:flex;justify-content:space-between;margin-bottom:10px;"></div>
            <input type="text" id="pDesc" placeholder="Description">
            <input type="number" id="pAmt" placeholder="Amount K">
            <select id="pType"><option value="expense">EXPENSE</option><option value="income">INCOME</option></select>

        </section>
    </div>

    <div id="withdraw" class="tab-content">
        <section class="glass" style="padding:18px;">
            <h3 style="color:var(--accent);margin-top:0;">WITHDRAWAL</h3>
            <div class="metric-box" style="margin-bottom:15px;border-color:var(--success);">MONTH PROFIT: <span id="wdProfitStat" style="color:var(--success);font-weight:bold;">K 0</span></div>

</div>
