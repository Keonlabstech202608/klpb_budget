<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#9333ea">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-startup-image" href="splash.png">
    <meta name="theme-color" content="#000b1a">
    <title>KLPB - Business Engine v4.7.2</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff; --deep-blue: #000b1a; --panel-bg: rgba(0, 11, 26, 0.85);
            --border-glow: rgba(0, 242, 255, 0.4); --text-main: #e0faff;
            --danger: #ff4d4d; --warning: #ffaa00; --success: #00ff88;
            --notif-purple: rgba(191, 0, 255, 0.75); 
        }
        #static-bg { position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background-color:var(--deep-blue);background-image:linear-gradient(rgba(0,11,26,0.7),rgba(0,11,26,0.7)),url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?auto=format&fit=crop&q=80&w=2071');background-size:cover;background-position:center; }
        #customNotification { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--notif-purple);color:white;padding:15px 30px;border-radius:12px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);z-index:40000;display:none;text-align:center;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.3); }
        #customModal { display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:20000;backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px; }
        body { font-family:'Segoe UI',sans-serif;color:var(--text-main);margin:0;background:transparent;-webkit-tap-highlight-color:transparent; }
        .auth-card { background:var(--panel-bg);border:1px solid var(--border-glow);padding:30px;border-radius:15px;width:320px;text-align:center;backdrop-filter:blur(10px); }
        .container { max-width:1200px;margin:auto;padding:15px;display:none;position:relative;z-index:1; }
        .tabs { display:flex;overflow-x:auto;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border-glow);padding-bottom:10px;scrollbar-width:none; }
        .tab-btn { flex:0 0 auto;background:rgba(0,242,255,0.05);border:1px solid var(--border-glow);color:var(--text-main);padding:10px 15px;cursor:pointer;border-radius:4px;font-weight:bold;font-size:0.7rem;text-transform:uppercase; }
        .tab-btn.active { background:var(--neon-blue);color:#000;box-shadow:0 0 10px var(--neon-blue); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        section { background:var(--panel-bg);border:1px solid var(--border-glow);padding:18px;border-radius:8px;margin-bottom:15px; }
        .metric-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px; }
        .metric-box { border:1px solid var(--border-glow);padding:10px;border-radius:6px;text-align:center;background:rgba(0,0,0,0.6); }
        .metric-val { display:block;font-size:0.9rem;font-weight:bold;color:var(--neon-blue); }
        input,select { background:rgba(0,15,30,0.9);border:1px solid var(--border-glow);color:white;padding:12px;width:100%;margin:6px 0;border-radius:6px;box-sizing:border-box;outline:none;transition:0.3s; }
        input:focus { border-color:var(--neon-blue);box-shadow:0 0 5px var(--neon-blue); }
        .btn-main { background:var(--success);color:#000;padding:12px;width:100%;border:none;font-weight:bold;cursor:pointer;border-radius:6px;margin-top:10px;transition:0.3s; }
        table { width:100%;border-collapse:collapse;font-size:0.75rem;background:rgba(0,0,0,0.3); }
        th { background:rgba(0,242,255,0.1);color:var(--neon-blue);padding:12px 8px;text-align:left; }
        td { padding:12px 8px;border-bottom:1px solid rgba(0,242,255,0.1); }
        .month-separator { background:rgba(191,0,255,0.15)!important;color:#df80ff!important;font-weight:bold;text-align:center; }
        .year-separator { background:linear-gradient(90deg,transparent,var(--notif-purple),transparent)!important;color:white!important;text-align:center;font-weight:bold;border:none; }
        .filter-btn { flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border-glow);color:var(--text-main);padding:6px;cursor:pointer;border-radius:4px;font-size:0.6rem;min-width:60px; }
        .filter-btn.active { background:var(--notif-purple);border-color:white; }
        .action-cell { display:flex;gap:5px;justify-content:flex-end; }
        .action-btn { border:none;width:32px;height:32px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
        .debt-alert { background:rgba(191,0,255,0.2);border-left:4px solid var(--neon-blue);padding:15px;border-radius:8px;margin-bottom:15px; }
        .overdue-debt { color:var(--danger)!important;font-weight:bold;animation:pulse 2s infinite; }
        @keyframes pulse { 0%{opacity:1;} 50%{opacity:0.7;} 100%{opacity:1;} }
        .biz-header { display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap; }
        .header-row { display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;background:rgba(0,242,255,0.1);padding:8px 12px;border-radius:8px;border:1px solid var(--border-glow); }
        .chart-container { background:rgba(0,0,0,0.4);padding:12px;border-radius:8px;border:1px solid var(--border-glow);margin-bottom:15px; }
    </style>
</head>
<body>

<div id="static-bg"></div>
<div id="customNotification"></div>

<div id="customModal">
    <div class="auth-card" style="width:100%; max-width:320px;">
        <h3 id="modalTitle"></h3>
        <div id="modalInputs"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button id="modalConfirm" class="btn-main">CONFIRM</button>
            <button onclick="closeCustomModal()" class="btn-main" style="background:var(--danger); color:white;">CANCEL</button>
        </div>
    </div>
</div>

<div id="authOverlay" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;">
    <!-- auth UI unchanged -->
    <div class="auth-card" id="loginBox">
        <div class="brand-header">
            <h1 class="brand-name">KEONLABS</h1>
            <span class="brand-sub">BUSINESS ENGINE v4.7.2</span>
        </div>
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPass" placeholder="Password">
        <button onclick="handleAuth('login')" class="btn-main">SYSTEM ACCESS</button>
        <div style="margin-top:15px;display:flex;flex-direction:column;gap:8px;">
            <span onclick="toggleAuthMode('signup')" style="color:var(--success);cursor:pointer;font-size:0.75rem;">NEW USER? CREATE ACCOUNT</span>
            <span onclick="toggleAuthMode('reset')" style="color:var(--warning);cursor:pointer;font-size:0.75rem;">FORGOT PASSWORD?</span>
        </div>
    </div>
    <!-- signup & reset boxes unchanged -->
    <div class="auth-card" id="signupBox" style="display:none;"> ... </div>
    <div class="auth-card" id="resetBox" style="display:none;"> ... </div>
</div>

<div class="container" id="mainApp">
    <!-- FIXED HEADER -->
    <div class="header-row">
        <div style="display:flex;align-items:center;gap:10px;">
            <span id="userDisplay" style="font-size:0.65rem;color:var(--success);font-weight:bold;"></span>
            <span id="syncIndicator" style="font-size:0.65rem;color:var(--neon-blue);opacity:0.7;">● LIVE SYNC</span>
        </div>
        <button onclick="logoutUser()" style="background:var(--danger);border:none;color:white;padding:6px 12px;border-radius:6px;font-size:0.7rem;">LOGOUT</button>
    </div>

    <div class="biz-header">
        <select id="bizSelect" onchange="switchBusiness(this.value)" style="flex:1;background:rgba(0,15,30,0.9);border:1px solid var(--border-glow);color:white;padding:10px;border-radius:6px;font-size:0.85rem;"></select>
        <button onclick="addNewBusiness()" style="background:var(--neon-blue);color:#000;padding:10px 16px;border:none;border-radius:6px;font-size:0.75rem;font-weight:bold;">+ NEW BIZ</button>
        <button onclick="resetUserData()" style="background:rgba(255,77,77,0.2);border:1px solid var(--danger);color:var(--danger);padding:6px 12px;border-radius:6px;font-size:0.7rem;">RESET</button>
    </div>

    <div style="background:rgba(0,242,255,0.1);padding:10px;border-radius:8px;margin-bottom:15px;display:flex;align-items:center;gap:10px;border:1px solid var(--border-glow);">
        <label style="font-size:0.7rem;color:var(--neon-blue);font-weight:bold;">TIMELINE:</label>
        <select id="globalMonth" style="margin:0;width:50%;" onchange="handleTimelineChange()"></select>
        <select id="globalYear" style="margin:0;width:40%;" onchange="handleTimelineChange()"></select>
    </div>

    <div class="metric-grid">
        <div class="metric-box">CAPITAL<span id="statCap" class="metric-val">K 0</span></div>
        <div class="metric-box">REVENUE<span id="statRev" class="metric-val">K 0</span></div>
        <div class="metric-box">DEBT<span id="statDebt" class="metric-val" style="color:var(--warning);">K 0</span></div>
        <div class="metric-box">NET PROFIT<span id="statProfit" class="metric-val" style="color:var(--success);">K 0</span></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'overview')">Overview</button>
        <button class="tab-btn" onclick="openTab(event, 'business')">Stock</button>
        <button class="tab-btn" onclick="openTab(event, 'debtors')">Debtors</button>
        <button class="tab-btn" onclick="openTab(event, 'ledger')">Ledger</button>
        <button class="tab-btn" onclick="openTab(event, 'personal')">Budget</button>
        <button class="tab-btn" onclick="openTab(event, 'withdraw')">Withdraw</button>
    </div>

    <!-- OVERVIEW -->
    <div id="overview" class="tab-content active">
        <section>
            <h3 style="color:var(--neon-blue);margin-top:0;">BUSINESS OVERVIEW</h3>
            <div class="chart-container"><canvas id="profitTrendChart" height="140"></canvas></div>
            <div class="chart-container"><canvas id="revBarChart" height="140"></canvas></div>
        </section>
    </div>

    <!-- STOCK -->
    <div id="business" class="tab-content">
        <section>
            <input type="text" id="bName" placeholder="Item Name">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;">
                <input type="number" id="bBuy" placeholder="Cap K">
                <input type="number" id="bSell" placeholder="Sell K">
                <input type="number" id="bStock" placeholder="Qty">
            </div>
            <button onclick="addBusiness()" class="btn-main">ADD STOCK ITEM</button>
            <input type="text" id="stockSearch" placeholder="🔍 Search items..." onkeyup="renderStock()" style="margin-top:10px;">
            <div style="overflow-x:auto;margin-top:15px;"><table id="bTable"><thead><tr><th>DETAILS</th><th>CAP</th><th>QTY</th><th style="text-align:right">SALE/RE</th></tr></thead><tbody></tbody></table></div>
        </section>
    </div>

    <!-- DEBTORS -->
    <div id="debtors" class="tab-content">
        <section>
            <div id="debtSummaryHeader" class="debt-alert" style="display:none;"><p id="debtSummaryText" style="margin:0;font-size:0.75rem;"></p></div>
            <input type="text" id="debtSearch" placeholder="🔍 Search name..." onkeyup="renderDebtors()">
            <div style="overflow-x:auto;"><table id="debtTable"><thead><tr><th>NAME</th><th>PHONE</th><th>ITEM</th><th>BAL</th><th>ACTIONS</th></tr></thead><tbody></tbody></table></div>
        </section>
    </div>

    <!-- LEDGER -->
    <div id="ledger" class="tab-content">
        <section>
            <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">
                <button class="filter-btn active" onclick="setLedgerFilter('ALL',this)">ALL</button>
                <button class="filter-btn" onclick="setLedgerFilter('SALE',this)">INCOME</button>
                <button class="filter-btn" onclick="setLedgerFilter('CAPITAL',this)">BIZ EXP</button>
                <button class="filter-btn" onclick="setLedgerFilter('PERSONAL',this)">PERS EXP</button>
                <button class="filter-btn" onclick="setLedgerFilter('DEBT',this)">DEBTS</button>
                <button class="filter-btn" onclick="setLedgerFilter('WITHDRAW',this)">WD</button>
            </div>
            <div style="display:flex;gap:5px;margin-bottom:10px;">
                <select id="timeFilter" onchange="renderLedger()" style="font-size:0.7rem;">
                    <option value="YEAR">THIS YEAR</option>
                    <option value="MONTH">THIS MONTH</option>
                    <option value="WEEK">THIS WEEK</option>
                </select>
                <input type="text" id="ledgerSearch" placeholder="🔍 Search logs..." onkeyup="renderLedger()" style="margin:0;">
            </div>
            <div style="overflow-x:auto;"><table id="ledgerTable"><thead><tr><th>DATE</th><th>DESC</th><th>TYPE</th><th>AMT</th></tr></thead><tbody></tbody></table></div>
            <div id="ledgerFooter" style="margin-top:10px;padding:10px;background:rgba(191,0,255,0.1);border-radius:5px;text-align:right;font-weight:bold;color:var(--notif-purple);"></div>
        </section>
    </div>

    <!-- BUDGET -->
    <div id="personal" class="tab-content">
        <section>
            <div id="pStatsContainer" style="display:flex;justify-content:space-between;margin-bottom:10px;"></div>
            <input type="text" id="pDesc" placeholder="Description">
            <input type="number" id="pAmt" placeholder="Amount K">
            <select id="pType"><option value="expense">EXPENSE</option><option value="income">INCOME</option></select>
            <button onclick="addPersonal()" class="btn-main">LOG ENTRY</button>
            <div style="overflow-x:auto;margin-top:10px;"><table id="pTable"><thead><tr><th>DESC</th><th>AMT</th><th>TYPE</th><th>X</th></tr></thead><tbody></tbody></table></div>
        </section>
    </div>

    <!-- WITHDRAW -->
    <div id="withdraw" class="tab-content">
        <section>
            <h3 style="color:var(--neon-blue);margin-top:0;">WITHDRAWAL</h3>
            <div class="metric-box" style="margin-bottom:15px;border-color:var(--success);">MONTH PROFIT: <span id="wdProfitStat" style="color:var(--success);font-weight:bold;">K 0</span></div>
            <input type="number" id="wAmt" placeholder="Amount K">
            <input type="text" id="wNote" placeholder="Reason">
            <button onclick="processWithdrawal()" class="btn-main" style="background:rgba(191,0,255,0.7);color:white;">TRANSFER TO BUDGET</button>
        </section>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://osloiqymubajtacarwze.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bEVd8mvJlf4Z2bcll61a7g_r8eQe_Ad';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let businesses = [];
let currentBizId = null;
let profitChart = null;
let barChart = null;
let currentLedgerType = 'ALL';
const months = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

function getCurrentBiz() {
    return businesses.find(b => b.id === currentBizId) || businesses[0];
}

function initTimeline() {
    const mSelect = document.getElementById('globalMonth');
    mSelect.innerHTML = months.map((m,i) => `<option value="${i}">${m}</option>`).join('');
    mSelect.value = new Date().getMonth();

    const ySelect = document.getElementById('globalYear');
    let years = [];
    for(let y=2025; y<=2100; y++) years.push(`<option value="${y}">YEAR ${y}</option>`);
    ySelect.innerHTML = years.join('');
    ySelect.value = new Date().getFullYear();
}

function isThisWeek(dateString) {
    const recordDate = new Date(dateString);
    const today = new Date();
    return Math.ceil(Math.abs(today - recordDate) / (1000*60*60*24)) <= 7;
}

function renderBizSelector() {
    const sel = document.getElementById('bizSelect');
    sel.innerHTML = businesses.map(b => `<option value="${b.id}" ${b.id===currentBizId?'selected':''}>${b.name}</option>`).join('');
}

function switchBusiness(id) {
    currentBizId = id;
    renderBizSelector();
    renderAll();
}

async function addNewBusiness() {
    const res = await openCustomModal("NEW BUSINESS", [{id:'name',type:'text',placeholder:'Business / Shop Name'}]);
    if(res && res.name) {
        const newBiz = { id: Date.now().toString(), name: res.name.trim(), businessData:[], stockHistory:[], personalLedger:[], debtors:[], globalLedger:[] };
        businesses.push(newBiz);
        currentBizId = newBiz.id;
        await syncData();
        renderBizSelector();
        renderAll();
        showNotify("New Business Created");
    }
}

function handleTimelineChange() {
    renderAll();   // now guaranteed to work
}

// LAZY RENDER FUNCTIONS (only when tab opened)
function renderStock() {
    const biz = getCurrentBiz();
    if(!biz) return;
    const activeMonth = parseInt(document.getElementById('globalMonth').value);
    const activeYear = parseInt(document.getElementById('globalYear').value);
    const search = document.getElementById('stockSearch').value.toLowerCase();

    const html = biz.businessData
        .filter(x => x.name.toLowerCase().includes(search) && (x.currentStock > 0))
        .map(x => `<tr><td><b style="color:var(--neon-blue)">${x.name}</b><br><small>K${x.unitSellPrice||0}</small></td><td>K${x.totalCapitalInvested||0}</td><td style="color:${x.currentStock<=3?'var(--warning)':'var(--success)'}">${x.currentStock}</td><td><div class="action-cell"><input type="number" id="q_${x.id}" value="1" style="width:30px;padding:2px;"><button class="action-btn" onclick="handleSale(${x.id},false)" style="background:var(--success)"><i class="fas fa-dollar-sign"></i></button><button class="action-btn" onclick="handleSale(${x.id},true)" style="background:var(--warning)"><i class="fas fa-user-clock"></i></button><button class="action-btn" onclick="openRestock(${x.id})" style="background:var(--neon-blue)"><i class="fas fa-plus"></i></button></div></td></tr>`).join('');
    document.querySelector("#bTable tbody").innerHTML = html || '<tr><td colspan="4" style="text-align:center;">No stock items yet.</td></tr>';
}

function renderDebtors() {
    const biz = getCurrentBiz();
    const totalD = biz.debtors.reduce((s,x)=>s+x.balance,0);
    document.getElementById('debtSummaryHeader').style.display = biz.debtors.length ? 'block' : 'none';
    document.getElementById('debtSummaryText').innerText = `K${totalD.toFixed(2)} Total Outstanding.`;

    const search = document.getElementById('debtSearch').value.toLowerCase();
    const html = biz.debtors.filter(d => d.name.toLowerCase().includes(search))
        .map(d => {
            const isOverdue = Math.floor(Math.abs(new Date()-new Date(d.id))/(1000*60*60*24)) >= 5;
            return `<tr><td>${d.name}</td><td><small>${d.phone}</small></td><td>${d.product}</td><td class="${isOverdue?'overdue-debt':''}">K${d.balance}</td><td><div class="action-cell"><button class="action-btn" onclick="sendWhatsAppReminder(${d.id})" style="background:#25D366;color:white;"><i class="fab fa-whatsapp"></i></button><button class="action-btn" onclick="payDebt(${d.id})" style="background:var(--success)"><i class="fas fa-check"></i></button></div></td></tr>`;
        }).join('');
    document.querySelector("#debtTable tbody").innerHTML = html || '<tr><td colspan="5" style="text-align:center;">No debtors yet.</td></tr>';
}

function renderLedger() {
    const biz = getCurrentBiz();
    const activeMonth = parseInt(document.getElementById('globalMonth').value);
    const activeYear = parseInt(document.getElementById('globalYear').value);
    const timeFrame = document.getElementById('timeFilter').value;
    const search = document.getElementById('ledgerSearch').value.toLowerCase();

    let lastMonthSeen = null, lastYearSeen = null, ledgerHTML = "", totalIncome = 0, totalExpense = 0;
    const filtered = [...biz.globalLedger].reverse().filter(l => {
        const typeMatch = (currentLedgerType === 'ALL' || l.type === currentLedgerType);
        const searchMatch = l.desc.toLowerCase().includes(search);
        let timeMatch = (timeFrame === 'YEAR' && l.year === activeYear) ||
                        (timeFrame === 'MONTH' && l.year === activeYear && l.month === activeMonth) ||
                        (timeFrame === 'WEEK' && isThisWeek(l.date));
        return typeMatch && searchMatch && timeMatch;
    });

    filtered.forEach(l => {
        if (l.year !== lastYearSeen) { ledgerHTML += `<tr class="year-separator"><td colspan="4">TIMELINE: ${l.year}</td></tr>`; lastYearSeen = l.year; lastMonthSeen = null; }
        if (l.month !== lastMonthSeen) { ledgerHTML += `<tr class="month-separator"><td colspan="4">${months[l.month]}</td></tr>`; lastMonthSeen = l.month; }
        const isPos = ['SALE','INCOME'].includes(l.type);
        const amt = Math.abs(l.amt);
        if(isPos) totalIncome += amt; else totalExpense += amt;
        ledgerHTML += `<tr><td style="color:var(--neon-blue);font-size:0.65rem;">${l.date}</td><td>${l.desc}</td><td style="font-size:0.6rem;opacity:0.7;">${l.type}</td><td style="color:${isPos?'var(--success)':'var(--danger)'}">${isPos?'+' : '-'}K${amt.toFixed(2)}</td></tr>`;
    });
    document.querySelector("#ledgerTable tbody").innerHTML = ledgerHTML || '<tr><td colspan="4" style="text-align:center;">No records.</td></tr>';
    document.getElementById('ledgerFooter').innerHTML = `<div style="display:flex;justify-content:space-between;font-size:0.75rem;"><span>INC: <span style="color:var(--success)">K${totalIncome.toFixed(2)}</span></span><span>EXP: <span style="color:var(--danger)">K${totalExpense.toFixed(2)}</span></span></div><div style="margin-top:5px;border-top:1px solid rgba(255,255,255,0.1);padding-top:5px;">NET: <span>K${(totalIncome-totalExpense).toFixed(2)}</span></div>`;
}

function renderPersonal() {
    const biz = getCurrentBiz();
    const activeMonth = parseInt(document.getElementById('globalMonth').value);
    const activeYear = parseInt(document.getElementById('globalYear').value);
    const pCur = biz.personalLedger.filter(x => x.month === activeMonth && x.year === activeYear);
    const inc = pCur.filter(x=>x.type==='income').reduce((s,x)=>s+x.amt,0);
    const exp = pCur.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amt,0);
    document.getElementById('pStatsContainer').innerHTML = `<div class="metric-box" style="flex:1;margin-right:5px;">INC: <span style="color:var(--success)">K${inc.toFixed(2)}</span></div><div class="metric-box" style="flex:1;margin-right:5px;">EXP: <span style="color:var(--danger)">K${exp.toFixed(2)}</span></div><div class="metric-box" style="flex:1;border-color:var(--neon-blue);">NET: <span style="color:var(--neon-blue)">K${(inc-exp).toFixed(2)}</span></div>`;
    const html = pCur.map(x => `<tr><td>${x.desc}</td><td>K${x.amt.toFixed(2)}</td><td style="color:${x.type==='income'?'var(--success)':'var(--danger)'}">${x.type.toUpperCase()}</td><td><button onclick="delP(${x.id})" style="color:var(--danger);background:none;border:none;">×</button></td></tr>`).join('');
    document.querySelector("#pTable tbody").innerHTML = html || '<tr><td colspan="4" style="text-align:center;">No budget entries.</td></tr>';
}

function updateMiniCharts() {
    const biz = getCurrentBiz();
    if(!biz) return;
    const year = parseInt(document.getElementById('globalYear').value);

    const monthlyProfit = Array(12).fill(0);
    biz.globalLedger.forEach(l => {
        if(l.year === year) {
            let p = 0;
            if(['SALE','INCOME'].includes(l.type)) p += l.amt;
            if(['CAPITAL','PERSONAL','WITHDRAW','DEBT'].includes(l.type)) p -= l.amt;
            monthlyProfit[l.month] += p;
        }
    });

    if(profitChart) profitChart.destroy();
    profitChart = new Chart(document.getElementById('profitTrendChart'), {
        type:'line',
        data:{ labels:months, datasets:[{label:'Profit K', data:monthlyProfit, borderColor:'#00ff88', tension:0.4, fill:true, backgroundColor:'rgba(0,255,136,0.15)'}] },
        options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{grid:{color:'rgba(0,242,255,0.1)'}}} }
    });

    let rev=0, cap=0, wd=0;
    const debtTotal = biz.debtors.reduce((s,d)=>s+d.balance,0);
    biz.globalLedger.forEach(l => {
        if(l.year !== year) return;
        if(l.type==='SALE'||l.type==='INCOME') rev += l.amt;
        if(l.type==='CAPITAL') cap += l.amt;
        if(l.type==='WITHDRAW') wd += l.amt;
    });

    if(barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('revBarChart'), {
        type:'bar',
        data:{ labels:['Revenue','Capital','Withdraw','Debt'], datasets:[{label:'K', data:[rev,cap,wd,debtTotal], backgroundColor:['#00ff88','#00f2ff','#ffaa00','#ff4d4d']}] },
        options:{responsive:true, plugins:{legend:{display:false}} }
    });
}

function renderAll() {
    const biz = getCurrentBiz();
    if(!biz) return;
    const activeMonth = parseInt(document.getElementById('globalMonth').value);
    const activeYear = parseInt(document.getElementById('globalYear').value);

    // STATS (always updated)
    const mCap = biz.stockHistory.filter(x => x.month === activeMonth && x.year === activeYear).reduce((s,x)=>s+(parseFloat(x.cost)||0),0);
    const mRev = biz.globalLedger.filter(l => l.month === activeMonth && l.year === activeYear && (l.type==='SALE'||l.type==='INCOME')).reduce((s,l)=>s+l.amt,0);
    const mWithdrawals = biz.globalLedger.filter(l => l.month === activeMonth && l.year === activeYear && l.type==='WITHDRAW').reduce((s,l)=>s+l.amt,0);
    const totalD = biz.debtors.reduce((s,x)=>s+x.balance,0);
    const netProfit = mRev - mCap - mWithdrawals;

    document.getElementById('statCap').innerText = `K ${mCap.toFixed(2)}`;
    document.getElementById('statRev').innerText = `K ${mRev.toFixed(2)}`;
    document.getElementById('statProfit').innerText = `K ${netProfit.toFixed(2)}`;
    document.getElementById('statDebt').innerText = `K ${totalD.toFixed(2)}`;
    document.getElementById('wdProfitStat').innerText = `K ${netProfit.toFixed(2)}`;

    updateMiniCharts();
}

// OPEN TAB + LAZY RENDER
function openTab(evt, tabName) {
    document.querySelectorAll(".tab-content, .tab-btn").forEach(x => x.classList.remove("active"));
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");

    renderAll(); // always update stats/charts

    if(tabName === 'business') renderStock();
    if(tabName === 'debtors') renderDebtors();
    if(tabName === 'ledger') renderLedger();
    if(tabName === 'personal') renderPersonal();
    // withdraw has no table
}

async function handleSale(id, isDebt) { /* same as before but with getCurrentBiz() */ 
    const biz = getCurrentBiz();
    const qty = parseInt(document.getElementById(`q_${id}`).value) || 1;
    const item = biz.businessData.find(x => x.id === id);
    if(!item || item.currentStock < qty) return showNotify("LOW STOCK", true);
    const total = (item.unitSellPrice || 0) * qty;
    const m = parseInt(document.getElementById('globalMonth').value);
    const y = parseInt(document.getElementById('globalYear').value);

    if(isDebt) {
        const res = await openCustomModal("DEBTOR", [{id:'n',type:'text',placeholder:'Name'},{id:'p',type:'text',placeholder:'Phone'}]);
        if(res && res.n) {
            biz.debtors.push({id:Date.now(), name:res.n, phone:res.p||'N/A', product:item.name, balance:total, originalId:id});
            logToLedger(`Debt: ${item.name} to ${res.n}`, 'DEBT', total, m, y);
            item.currentStock -= qty;
        } else return;
    } else {
        item.totalSalesRevenue = (item.totalSalesRevenue||0) + total;
        item.currentStock -= qty;
        logToLedger(`Sale: ${item.name} x${qty}`, 'SALE', total, m, y);
    }
    await syncData();
    renderAll();
    if(document.getElementById('business').classList.contains('active')) renderStock();
    showNotify("SAVED");
}

async function syncData() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if(!user) return;
    await supabaseClient.from('user_budgets').upsert({
        user_id: user.id,
        payload: { businesses, currentBizId },
        updated_at: new Date().toISOString()
    });
}

async function loadData(userId) {
    const { data } = await supabaseClient.from('user_budgets').select('payload').eq('user_id', userId).maybeSingle();
    const payload = data?.payload || {};
    
    if (payload.businesses && Array.isArray(payload.businesses) && payload.businesses.length > 0) {
        businesses = payload.businesses;
        currentBizId = payload.currentBizId || businesses[0].id;
    } else {
        businesses = [{
            id: 'main',
            name: 'Main Shop',
            businessData: payload.businessData || [],
            stockHistory: payload.stockHistory || [],
            personalLedger: payload.personalLedger || [],
            debtors: payload.debtors || [],
            globalLedger: payload.globalLedger || []
        }];
        currentBizId = 'main';
        await syncData();
        showNotify("✅ Data migrated");
    }
    
    initTimeline();
    renderBizSelector();
    document.getElementById('overview').classList.add('active'); // default
    renderAll();
    setupRealtime(userId);
}
